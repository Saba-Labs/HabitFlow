[build]
  command = "npm run build:client"
  publish = "dist/spa"
  # Use npm (package-lock.json); avoids frozen pnpm-lock mismatch on CI
  installCommand = "npm ci"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["server/**", "shared/**"]

# API rewrites are also in public/_redirects (copied to dist/spa on build).
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
